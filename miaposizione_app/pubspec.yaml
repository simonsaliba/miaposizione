name: miaposizione
description: "App per tracciare e condividere la tua posizione GPS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  flutter_riverpod: ^2.5.1
  
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  
  google_maps_flutter: ^2.6.1
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  share_plus: ^9.0.0
  
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
